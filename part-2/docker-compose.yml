services:

  openldap:
    image: osixia/openldap:1.5.0
    platform: linux/amd64
    environment:
      LDAP_ORGANISATION:    "Dew CIS"
      LDAP_DOMAIN:          "dewcis.com"
      LDAP_ADMIN_PASSWORD:  "adminpass"
    ports:
      - "3389:389"
    volumes:
      - ./ldap-seed.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/seed.ldif:ro
    command: --copy-service
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost",
             "-b", "dc=dewcis,dc=com", "-D", "cn=admin,dc=dewcis,dc=com",
             "-w", "adminpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ldap-admin:
    image: osixia/phpldapadmin:0.9.0
    platform: linux/amd64
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
    ports:
      - "8090:80"
    depends_on:
      openldap:
        condition: service_healthy